  <body>
    <div id="root"></div>
    <script>
      // Recharge l'app si un chunk JS obsolète disparaît après un déploiement
      // (navigateur avec un index.html périmé en cache pointant vers d'anciens
      // hashs d'assets). Garde sessionStorage pour éviter une boucle infinie
      // si la cause réelle n'est pas un déploiement.
      (function () {
        var KEY = '__chunk_reload_at';
        function isChunkErr(msg) {
          if (!msg) return false;
          msg = String(msg);
          return /Failed to fetch dynamically imported module|error loading dynamically imported module|Importing a module script failed|ChunkLoadError|Loading chunk \d+ failed/i.test(msg);
        }
        function maybeReload(msg) {
          if (!isChunkErr(msg)) return;
          var now = Date.now();
          var last = parseInt(sessionStorage.getItem(KEY) || '0', 10);
          if (now - last < 10000) return; // pas plus d'un reload toutes les 10s
          sessionStorage.setItem(KEY, String(now));
          window.location.reload();
        }
        window.addEventListener('error', function (e) { maybeReload(e && (e.message || (e.error && e.error.message))); });
        window.addEventListener('unhandledrejection', function (e) { maybeReload(e && e.reason && (e.reason.message || e.reason)); });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
